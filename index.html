<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart_Task_Manager</title>
    <link rel="stylesheet" href="Src/style.css">
  </head>
  <body>
    <h1 class="page-title">Smart Task Manager</h1>
    
    <div class="form-card">
      <h2 class="form-section-title">Task Details</h2>
      
      <div class="form-row form-row-2col">
        <div class="form-group">
          <label for="task-title" class="form-label">Task Title <span class="required-star">*</span></label>
          <input type="text" id="task-title" placeholder="Enter task title" class="form-control" />
          <div id="title-error" class="error-msg d-none">Task Title is required.</div>
        </div>
        
        <div class="form-group">
          <label for="task-priority" class="form-label">Priority <span class="required-star">*</span></label>
          <select id="task-priority" class="form-control form-select">
            <option value="">Select Priority</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
          <div id="priority-error" class="error-msg d-none">Priority is required.</div>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="task-desc" class="form-label">Description</label>
          <textarea id="task-desc" placeholder="Enter task description" class="form-control form-textarea"></textarea>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Is Completed? <span class="required-star">*</span></label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" id="pending" name="task-status" value="false">
              Pending
            </label>
            <label class="radio-label">
              <input type="radio" id="completed" name="task-status" value="true">
              Completed
            </label>
          </div>
          <div id="status-error" class="error-msg d-none">Completion status is required.</div>
        </div>
      </div>
      
      <div class="form-actions">
        <button id="add-btn" class="btn-primary">Add Task</button>
        <button id="clear-btn" type="button" class="btn-secondary">Clear</button>
      </div>
    </div>

    <div class="P-container">
        <header class="tasks-header">
            <h2>My Tasks</h2>
            <input type="text" id="search-task" placeholder="Search task...">
        </header>
        <div class="table-container">
            <table class="task-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Created At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="task-list"></tbody>
            </table>
        </div>
        

        <!-- <button id="delete-btn">Delete</button>
        <button id="edit-btn">Edit</button> -->
    </div>
    <script src="Src/App.js"></script>
</body>
</html>
