<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart_Task_Manager</title>
    <link rel="stylesheet" href="Src/style.css">
  </head>
  <body>
    <h1 class="P-title">Smart-Task-Manager</h1>
    
    <div class="P-task-container">
      <h3>Task Details</h3>
      <label for="task-id">No:</label>
      <input type="number" id="task-id" min="1" max="1000" placeholder="No" />
      <input type="text" id="task-title" placeholder="Task Title" class="P-input" />
      <br /><br />
      <input type="text" id="task-desc" placeholder="Description" class="P-Detail" />

      <br /><br />
      <button id="add-btn">Add</button>

      <br /><br />

      <label for="task-priority">Priority:</label>

      <select id="task-priority" name="priority">
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
      </select>

      <br /><br />

      <label>Task Created Date</label>
      <input type="date" id="task-date" />

      <br/><br />

      <label for="task-status">is Completed ?</label>
      <select id="task-status" name="status">
        <option value="True">True</option>
        <option value="False">False</option>
      </select>
    </div>

    <div class="P-container">
        <header>
            <h2>My Tasks</h2>
        </header>
        <ul id="task-list"></ul>
        
        <label for="search-task">Search:</label>
        <input type="text" id="search-task" placeholder="Search task...">

        <button id="delete-btn">Delete</button>
        <button id="edit-btn">Edit</button>
    </div>
    <script src="Src/App.js"></script>
</body>
</html>
